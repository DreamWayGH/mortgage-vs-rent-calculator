<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="房貸 vs 租房 投資 圖示">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- 背景圓 -->
  <rect width="300" height="300" rx="68" fill="#ffffff"/>

  <!-- 房子（左側） -->
  <g transform="translate(10,40)">
    <polygon points="96 0 192 72 192 200 0 200 0 72" fill="url(#g1)"/>
    <rect x="40" y="96" width="56" height="72" fill="#ffffff" opacity="0.9" rx="6"/>
    <rect x="112" y="128" width="48" height="40" fill="#ffffff" opacity="0.85" rx="6"/>
  </g>

  <!-- 投資柱狀圖與幣圈（右側） -->
  <g transform="translate(150,80)">
    <!-- 幣圈背景 -->
    <circle cx="90" cy="00" r="48" fill="#f59e0b"/>
    <!-- 柱狀圖 -->
    <rect x="0" y="88" width="32" height="88" rx="6" fill="url(#g2)"/>
    <rect x="44" y="44" width="32" height="132" rx="6" fill="#34d399"/>
    <rect x="88" y="0" width="32" height="176" rx="6" fill="#10b981"/>
    <!-- 上升箭頭（代表成長） -->
    <polyline points="56 56 88 28 136 76" fill="none" stroke="#065f46" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>
